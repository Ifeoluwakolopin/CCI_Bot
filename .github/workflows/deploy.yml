name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ifeoluwakolopin/cci-bot

jobs:
  build-push:
    name: Build & push arm64 image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Pi
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Deploy on Pi
        env:
          IMAGE: ghcr.io/ifeoluwakolopin/cci-bot:latest
          APP_DIR: cci-bot
          REPO: Ifeoluwakolopin/CCI_Bot
          CONTEXT: "."
          DOCKERFILE: Dockerfile
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          APP_PATH="$HOME/.config/$APP_DIR"
          if [ ! -f "$APP_PATH/.env" ]; then
            echo "::warning::No env at $APP_PATH/.env — image published to GHCR but skipping start (provision secrets to run)."
            exit 0
          fi
          cd "$APP_PATH"
          if docker compose pull; then
            docker compose up -d
          else
            echo "::warning::pull failed; building $IMAGE locally from a shallow clone"
            WORK="$(mktemp -d)"
            git clone --depth 1 "https://github.com/$REPO.git" "$WORK"
            docker build -t "$IMAGE" -f "$WORK/$DOCKERFILE" "$WORK/$CONTEXT"
            docker push "$IMAGE" || echo "::warning::could not push $IMAGE to GHCR; using local image"
            rm -rf "$WORK"
            docker compose up -d
          fi
          docker compose ps
